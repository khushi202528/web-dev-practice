<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>images</title>
</head>
<body>

</body>
    <img height="200" src="dog.jpg" alt="dog">
    <!-- image is a visual representation of an object or concept -->
     <!-- alt attribute provides alternative text for the image -->
      <!-- always set height or width but prefferable height -->
    <link rel="stylesheet" href="style.css">

    <!-- table  -->
    <!-- table is a structured way to display data in rows and columns -->
    <!-- caption is used to provide a title for the table -->
    <!-- thead is used to group the header content in a table -->
    <!-- tbody is used to group the body content in a table -->
    <!-- tfoot is used to group the footer content in a table -->
    <!-- tr is used to define a row in a table -->
    <!-- th is used to define a header cell in a table -->
    <!-- td is used to define a standard cell in a table -->
    <!-- colspan attribute is used to specify the number of columns a cell should span -->
    <!-- rowspan attribute is used to specify the number of rows a cell should span -->
    <table>
        <caption> Details</caption>

        <thead>
        <tr>
            <th> Name </th>
            <th> Class </th>
            <th> roll.no </th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td> Khushi </td>
            <td> first</td>
            <td>25</td>
        </tr>

        <tr>
            <td> kitu</td>
            <td> second</td>
            <td rowspan = "2">65</td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <td colspan ="2"> joy</td>
            <!-- <td> third</td> -->
            <!-- <td rowspanr = "2">5</td> -->
        </tr>
        </tfoot>
    </table>


    <!-- LIST -->
    <!-- LIST is a structured way to display a collection of items -->
    <!-- THREE TYPES: Unordered, Ordered, and Description -->
    <!-- for unordered lists, use the <ul> element -->
    <!-- in unordered lists, each item is typically displayed with a bullet point -->
    <!-- for ordered lists, use the <ol> element -->
    <!-- in ordered lists, each item is typically displayed with a number or letter -->
    <!-- for description lists, use the <dl> element -->
    <!-- in description lists, each item consists of a term and a description -->


    <body>
        <h1>List </h1>
    <h2>Unordered List</h2>
    <ul type = "square">
        <!-- type attribute specifies the style of the bullet point -->
         <!-- few type attributes are: disc, circle, square -->
        <li>   mango 1 </li>
        <li>   orange 2 </li>
        <li>   apple 3 </li>

    </ul>

    <h2>Ordered List</h2>
    <ol>
        <li>   mango 1 </li>
        <li>   orange 2 </li>
        <li>   apple 3 </li>
    </ol>

    <h2> Description List </h2>
    <dl>
        <dt> HTML </dt>
        <dd> Hypertext Markup Language </dd>

        <dt> CSS </dt>
        <dd> Cascading Style Sheets </dd>

        <dt> JS </dt>
        <dd> JavaScript </dd>
    </dl>
    </body>
</html>
