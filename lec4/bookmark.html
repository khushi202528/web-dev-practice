<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> bookmark-manager</title>
</head>
<body>1
    <p> primary bookmark</p>
    <p> <a target="_blank" href="http://www.google.com">open google</a></p> <!-- primary bookmark is used for important website which we want to open quickly and easily -->
    
    <!-- target="_blank" opens the link in a new tab -->
    <p> secondary bookmark</p>          <!-- secondary bookmark is used for less important website which we want to open quickly and easily -->

    <p> <a target="_blank" href="http://www.facebook.com">open facebook</a></p>
    
</body>
</html>
