<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS SELECTOR</title>
    <style>
        .box:first-child {
            background-color: #17f04a90;
            color: rgb(216, 13, 13);
        }

        .box::first-line {
            color: rgba(132, 134, 42, 0.863);

        }

        /* * → uske andar ke saare elements (universal selector)

            Toh .boxes ke andar jitne bhi tags honge (p, div, span, h1, etc.) un sab par ye styles apply hongi:

        text color blue
        black border */
        .boxes * {
            color: blue;
            border: 4px solid black;
        }


    </style>
</head>

<body>
    <div>
        <div data-color="primary" class="box">I am first box</div>
        <div class="box">Hey I am a box <br> blahh blahh blahh </div>
        <div class="box">Hey I am a box</div>
        <input type="text" placeholder="Type your name here">
    </div>

</body>

</html>
