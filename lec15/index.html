<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 3 wala point hum yha krte hai -->
     <!-- more like agr h1 ko colour krna haui tho aon yha pr kr te hai  -->
      <style> 
      h2{ 
         color : red ;}
        
        </style>
</head>
<!-- 
CSS are of three types:

1. External CSS:
   - Hum CSS ko alag file (style.css) mein likhte hain.
   - Fir us file ko HTML ke <head> section mein <link> tag ke through connect karte hain.

2. Inline CSS:
   - Hum CSS ko directly HTML tag ke andar style="" attribute ke through likhte hain.

3. Internal CSS:
   - Hum CSS ko HTML file ke <head> section ke andar <style> tag mein likhte hain.
-->
<body>
    <h1> 3nd method</h1>
    <!--  yha jo hum style krne walai hai woh h2 kai upr hone wala hai and hum yha 2nd method ki baat kr rhai hai  -->

    <h2 style = "color : rgb(34, 0, 255) "> 3rd methiod</h2>
</body>
</html>
