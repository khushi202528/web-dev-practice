    <title>flex</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;


        }

        div {
            border: 2px solid black;
            border-radius: 15px;
            width: 320px;

        }

        .list {
            display: flex;
            /* Items horizontal ho jayenge */
            list-style: none;
            gap: 1px;
            margin-top: 15px;
            column-gap: 2cqb;
        }

        .list a {

            text-decoration: none;
            color: grey;
            border: 1px solid #ccc;
            padding: 4px 10px;


            border-radius: 20px;
            font-size: 14px;
            


        }

        p {
            line-height: 2;
        }

        .image {
            image-rendering: crisp-edges;
            image-orientation: from-image;
            text-align: center;
            border-radius: 15px;
            width: 100%;
            display: block;
            border-radius: 15px;
        }

            background-color: hsla(203, 89%, 46%, 0.747);
