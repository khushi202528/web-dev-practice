<!DOCTYPE html>
<html lang="en">
<!-- Relative - Apni orginal position se change hogi
Absolute - apne parent ke relative position change hogi
Fixed - page mein position fixed hojaygi
Sticky - page mein kahin bhi ho, scroll krne pr neeche nhi jaygi, stick hojaygi

 -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS POSITION</title>
    <p> Relative - Apni orginal position se change hogi
        Absolute - apne parent ke relative position change hogi
        Fixed - page mein position fixed hojaygi
        Sticky - page mein kahin bhi ho, scroll krne pr neeche nhi jaygi, stick hojaygi</p>
    <Style>
        * {
            margin: 0px;
            padding: 0px;
        }

        .box {
            height:3px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
            border: 2px solid black;
        }

        .box1 {
            background-color: aqua;
            position: absolute;
            top: 0px;
            /* absolute=Absolute - apne parent ke relative position change hogi
            iska parent pehle class="parent hai " mgr uski posotion static hai kuch given nahi hai 
            fir woh body se puchega aap kai hai agr nahi tho woh direct html se ouchega aur
             html bolega hai nahi lekin tu mere ider yani uspk relatve lag jyega  */

            /* IF parent postion kai pass rhega tho woh usk alogn reltive ho jyega  */
        }

        .box2 {
            background-color: blue;
            position: relative;
            top: 34px;
            right:5px;
        }

        .box3 {
            background-color: sandybrown;
            position: fixed;
            /* 
   Easy Memory Trick:
   - Fixed = Permanently chipka hua.
   - Sticky = Scroll karte-karte chipakta hai. */
            top: 0px;
            left: 4px;
        }

        .box4 {
            background-color: pink;
        }

        .parent {
            padding: 53px;
            margin: 34px;
            border: 3px solid purple;
            position: relative;
            top: 5px
            /* transform: translate(0); */
            /* filter: invert(5) */
            /* perspective: 0em */
            /* -------------------------important properties----------------------------------------
                - transform - filter - perspective Agar parent par inme se koi property lagi ho,
                to child element (especially position: absolute ya fixed) us parent ko reference maan sakta hai.
        } */
    </Style>
</head>

<body>
    <div class="parent">

        <div class="box box1"> </div>
        <div class="box box2"> </div>
        <div class="box box3"> </div>
        <div class="box box4"> </div>

    </div>
</body>

</html>
